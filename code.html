<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agro Marketing Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f2f2f2;}

/* HEADER */
header{
background:green;
color:white;
padding:20px;
text-align:center;
}

/* NAV */
nav{
background:#111;
padding:10px;
}
nav ul{
display:flex;
justify-content:center;
flex-wrap:wrap;
list-style:none;
}
nav ul li{
margin:10px;
}
nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* LAYOUT */
.container{
padding:20px;
}
.hidden{display:none;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
padding:8px;
margin-top:5px;
border:none;
cursor:pointer;
border-radius:5px;
}

.buy{background:orange;color:white;}
.cart{background:blue;color:white;}
.delete{background:red;color:white;}

/* ORDERS */
.order{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
<h1>AGRO MARKETING SYSTEM</h1>
<p>Buyer & Seller Platform</p>
</header>

<nav>
<ul>
<li><a href="#" onclick="show('products')">Products</a></li>
<li><a href="#" onclick="show('orders')">Orders</a></li>
<li><a href="#" onclick="show('login')">Login</a></li>
</ul>
</nav>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<select id="role">
<option value="buyer">Buyer</option>
<option value="seller">Seller</option>
</select><br><br>
<button onclick="login()">Login</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="hidden">
<h2>Products</h2>
<div class="products" id="productList"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="hidden">
<h2>Your Orders</h2>
<div id="orderList"></div>
</div>

</div>

<script>

/* SESSION */
let currentUser = null;

/* PRODUCTS */
let products = [
{ id:1, name:"Potatoes", price:500, image:"https://via.placeholder.com/200", seller:"seller1" },
{ id:2, name:"Maize", price:700, image:"https://via.placeholder.com/200", seller:"seller2" }
];

/* ORDERS (LOCAL STORAGE SAFE) */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* NAV */
function show(id){
document.querySelectorAll(".container > div")
.forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* LOGIN */
function login(){
currentUser = {
email:document.getElementById("email").value,
role:document.getElementById("role").value
};

alert("Logged in as "+currentUser.role);

show("products");
displayProducts();
displayOrders();
}

/* PRODUCTS */
function displayProducts(){

let list = document.getElementById("productList");
list.innerHTML="";

products.forEach((p,i)=>{

list.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.price} RWF</p>
<p><b>Seller:</b> ${p.seller}</p>

<button class="buy" onclick="buyNow(${i})">Buy Now</button>
</div>
`;

});
}

/* BUY NOW → ORDER */
function buyNow(i){

if(!currentUser){
alert("Login first");
return;
}

let p = products[i];

let order = {
id:Date.now(),
product:p.name,
image:p.image,
price:p.price,
seller:p.seller,
buyer:currentUser.email,
status:"Pending"
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

alert("Order sent successfully!");
displayOrders();
show("orders");
}

/* ORDERS */
function displayOrders(){

let list = document.getElementById("orderList");
list.innerHTML="";

if(orders.length===0){
list.innerHTML="<h3>No Orders Yet</h3>";
return;
}

orders.forEach(o=>{

// BUYER VIEW
if(currentUser && currentUser.role==="buyer" && o.buyer!==currentUser.email) return;

// SELLER VIEW
if(currentUser && currentUser.role==="seller" && o.seller!==currentUser.email) return;

list.innerHTML += `
<div class="order">

<img src="${o.image}" width="100">

<h3>${o.product}</h3>
<p>Price: ${o.price}</p>
<p>Buyer: ${o.buyer}</p>
<p>Seller: ${o.seller}</p>
<p>Status: ${o.status}</p>

</div>
`;

});

}

/* INIT */
displayProducts();
displayOrders();

</script>

</body>
</html>
